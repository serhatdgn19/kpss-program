<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>📚 KPSS Ders Programı</h1>

        <h2>Giriş Yap</h2>

        <input type="email" id="email" placeholder="E-posta">

        <input type="password" id="password" placeholder="Şifre">

        <button id="loginBtn">Giriş Yap</button>

        <p id="message"></p>

        <p class="auth-link">
            Hesabın yok mu?
            <a href="register.html">Kayıt Ol</a>
        </p>

        <p class="auth-link">
            <a href="#" id="forgotPassword">Şifremi Unuttum</a>
        </p>

    </div>

</div>

<script type="module" src="auth.js"></script>
<footer class="footer">
    <div>KPSS Ders Programı <span class="version">v2.0</span></div>
    <div>© 2026 Serhat Doğan tarafından geliştirilmiştir.</div>
    <div>Tüm hakları saklıdır.</div>
</footer>
</body>
</html>
