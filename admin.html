<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="admin-container">

    <aside class="sidebar">

        <h2>⚙️ Admin Paneli</h2>

        <button id="usersBtn">👥 Kullanıcılar</button>

        <button id="logoutBtn">🚪 Çıkış Yap</button>

    </aside>

<main class="content">

    <div class="left-panel">

        <h2>Kullanıcılar</h2>
        <div class="stats">

    <div class="stat-card">
        <h3 id="totalUsers">0</h3>
        <span>👥 Toplam Kullanıcı</span>
    </div>

    <div class="stat-card">
        <h3 id="activeToday">0</h3>
        <span>🟢 Bugün Aktif</span>
    </div>

    <div class="stat-card">
        <h3 id="avgProgress">%0</h3>
        <span>📚 Ortalama İlerleme</span>
    </div>

    <div class="stat-card">
        <h3 id="lastLogin">-</h3>
        <span>🕒 Son Giriş</span>
    </div>

</div>

        <input
            type="text"
            id="searchInput"
            placeholder="Kullanıcı ara..."
        >

        <div id="userList"></div>
        <button id="copyProgramBtn">
    📋 Programı Kopyala
</button>

    </div>

    <div class="right-panel">

<div id="programContainer">

    <div id="previewHeader">

    <h2 id="previewName">Kullanıcı Seçilmedi</h2>

    <p><b>Mail:</b> <span id="previewMail">-</span></p>

    <p><b>Rol:</b> <span id="previewRole">-</span></p>

    <p><b>Son Görülme:</b> <span id="previewLastSeen">-</span></p>

    <hr>

    <h3>📚 Ders İlerlemesi</h3>

    <div id="previewProgress">

        <div id="previewProgressFill"></div>

    </div>

    <span id="previewProgressText">
        0 / 168 Ders
    </span>

    <br><br>

    <h3>📅 Gün Tamamlama</h3>

    <div id="previewDayProgress">

        <div id="previewDayProgressFill"></div>

    </div>

    <span id="previewDayProgressText">
        0 / 56 Gün
    </span>

</div>

    <div id="previewWeeks"></div>

    <div id="previewContent"></div>

</div>

    </div>

</main>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
